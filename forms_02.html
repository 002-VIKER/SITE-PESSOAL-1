<!-- Construa seu formulário de contato aqui -->
<!-- Dica: comece com <form method="post"> -->

<form action="/usuarios/novo" method="post">
<h2>Pesquisa de satisfação</h2>
 <fieldset>
    <legend>Dados Pessoais</legend>
<label for="nome">Nome completo:</label>
    <input type="text" id="nome" name="nome"
           placeholder="Ex.:" required
           minlength="3" maxlength="100">

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email"
           required autocomplete="email">
    
    <label for="fone">Telefone:</label>
    <input type="number" id="fone" name="fone">
    
    <label for="nascimento">Data de nascimento:      </label>
    <input type="date" id="nascimento" name="nascimento">

    <label for="endereco">Endereço:</label>
    <input type="text" id="nome" name="nome"
           placeholder="Ex.:" required
           minlength="3" maxlength="100">

    <!-- Radio buttons — mesmo name = mesmo grupo -->
    <fieldset>
      <legend>Qual o seu nível de satisfação?:</legend>
      <label><input type="radio" name="NPS" value="insatisfeito">Insatisfeito</label>
      <label><input type="radio" name="NPS" value="neutro"> Neutro</label>
 <label><input type="radio" name="NPS" value="satisfeito">Satisfeito</label>
 <label><input type="radio" name="NPS" value="muitosatisfeito">Muito Satisfeito</label>
    </fieldset>

    <label for="bio">Caixinha de Sugestão (opcional):</label>
    <textarea id="bio" name="bio" rows="4" maxlength="500"></textarea>

    <label>
      <input type="checkbox" name="aceitar_termos" required>
      Aceito os <a href="/termos">termos de uso</a>
    </label>

  </fieldset>

  <button type="submit">Criar conta</button>
</form>
